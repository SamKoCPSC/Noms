services:
  postgres:
    build: ./docker/postgres
    container_name: noms-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: noms
      POSTGRES_PASSWORD: noms_local_pass
      POSTGRES_DB: noms
    volumes:
      - noms-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noms"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: noms-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: noms-local-key
      MINIO_ROOT_PASSWORD: noms-local-secret
    volumes:
      - noms-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: noms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 noms-local-key noms-local-secret &&
      mc mb --ignore-existing local/noms-media &&
      echo 'noms-media bucket ready'
      "

  mock-oauth:
    image: ghcr.io/navikt/mock-oauth2-server:latest
    container_name: noms-mock-oauth
    ports:
      - "8082:8080"
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/isalive || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  noms-postgres-data:
  noms-minio-data:
